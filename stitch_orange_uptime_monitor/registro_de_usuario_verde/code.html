<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | WEBPULSE</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
        body {
            background-color: #0e0e10;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: #09090b;
            border: 1px solid #27272a;
        }
        .input-focus:focus {
            border-color: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
        }

<body class="font-body-md text-on-background selection:bg-primary/30 min-h-screen flex flex-col items-center justify-center p-margin">
<!-- Auth Container -->
<main class="w-full max-w-[480px] flex flex-col gap-lg">
<!-- Branding Header -->
<header class="text-center flex flex-col items-center gap-sm">
<div class="flex items-center gap-xs mb-sm">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">pulse_alert</span>
<span class="font-label-mono text-headline-md font-bold tracking-tighter text-primary">WEBPULSE</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface">Create your infrastructure account</h1>
<p class="font-body-md text-on-surface-variant max-w-[320px]">Deploy and monitor with precision. Join the high-performance network.</p>
</header>
<!-- Sign Up Form Card -->
<div class="glass-panel p-lg lg:p-xl rounded-lg w-full">
<form class="flex flex-col gap-md">
<!-- Full Name Field -->
<div class="flex flex-col gap-base">
<label class="font-label-mono text-label-mono text-on-surface-variant uppercase" for="full_name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[18px]">person</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-md pl-[44px] pr-md text-on-surface placeholder:text-outline/50 focus:outline-none input-focus transition-all font-body-md" id="full_name" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-base">
<label class="font-label-mono text-label-mono text-on-surface-variant uppercase" for="email">Work Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[18px]">alternate_email</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-md pl-[44px] pr-md text-on-surface placeholder:text-outline/50 focus:outline-none input-focus transition-all font-body-md" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-base">
<label class="font-label-mono text-label-mono text-on-surface-variant uppercase" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[18px]">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-md pl-[44px] pr-md text-on-surface placeholder:text-outline/50 focus:outline-none input-focus transition-all font-body-md" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-base">
<label class="font-label-mono text-label-mono text-on-surface-variant uppercase" for="confirm_password">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[18px]">shield_lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-md pl-[44px] pr-md text-on-surface placeholder:text-outline/50 focus:outline-none input-focus transition-all font-body-md" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms & Conditions -->
<div class="flex items-start gap-md mt-sm">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded-sm border-outline-variant bg-surface-container-lowest text-primary-container focus:ring-primary-container focus:ring-offset-background" id="terms" type="checkbox"/>
</div>
<label class="font-body-md text-on-surface-variant leading-tight" for="terms">
                        I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a> regarding my telemetry data.
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary-container font-label-mono py-md rounded-lg font-bold uppercase tracking-widest hover:brightness-110 active:scale-[0.98] transition-all mt-sm flex justify-center items-center gap-sm" type="submit">
                    Initialize Account
                    <span class="material-symbols-outlined text-[18px]">terminal</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-outline-variant"></span>
</div>
<div class="relative flex justify-center text-label-mono">
<span class="bg-surface-container-lowest px-md text-outline">OR REGISTER WITH</span>
</div>
</div>
<!-- SSO Options -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm border border-outline-variant py-sm rounded-lg hover:bg-surface-container hover:border-outline transition-colors">
<img alt="Google" class="w-4 h-4 grayscale" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBIBnkel-R3iJO8HZTpwwpDRtEM0sgYd2N0OPZZkgALCk7VV1ukU4CBdK46zu_whDYyC8xIf46-ByOfFXQqiEYpeXA9P5e-2HRWIjqPyZTd5m-qd-kBCE-JP2TfqjmfMUsiNtoDzMJjbNtzCWIqYpkUoWL2gqhLh_JT2vz7_QAdycEI2uJhLgDEJntkAoWhp6syPnR2XT9jXGQAOWWTMJKdrWBNJXwYm1HuwcxcH9ykb0bhNR3fRiDOcb5ATY5pj6CMKHeZdArQbm-d"/>
<span class="font-label-mono text-label-mono text-on-surface">GitHub</span>
</button>
<button class="flex items-center justify-center gap-sm border border-outline-variant py-sm rounded-lg hover:bg-surface-container hover:border-outline transition-colors">
<span class="material-symbols-outlined text-[18px]">cloud</span>
<span class="font-label-mono text-label-mono text-on-surface">SSO</span>
</button>
</div>
</div>
<!-- Navigation Back -->
<footer class="text-center">
<p class="font-body-md text-on-surface-variant">
                Already part of the system? 
                <a class="text-primary font-bold hover:underline transition-all ml-xs" href="#">Log in here</a>
</p>
</footer>
</main>
<!-- Decorative Background Elements -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
<!-- Emerald Pips / Grid Effect -->
<div class="absolute top-0 left-0 w-full h-full opacity-5" style="background-image: radial-gradient(#10b981 1px, transparent 1px); background-size: 32px 32px;"></div>
<!-- Large Tonal Glows -->
<div class="absolute -top-[10%] -right-[10%] w-[500px] h-[500px] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[500px] h-[500px] bg-primary/5 blur-[120px] rounded-full"></div>
</div>
</body></html>
