services:
  postgres:
    image: postgres:16
    container_name: uptimewatch-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init-uptimewatch-container.sql:/docker-entrypoint-initdb.d/01-init-uptimewatch.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - uptimewatch_internal

  redis:
    image: redis:7-alpine
    container_name: uptimewatch-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - uptimewatch_internal

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: uptimewatch-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - uptimewatch_internal

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.scheduler
    container_name: uptimewatch-scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SCHEDULER_PULSE_MS: ${SCHEDULER_PULSE_MS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uptimewatch_internal

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: uptimewatch-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - uptimewatch_internal

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: uptimewatch-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:4173"
    depends_on:
      api:
        condition: service_started
    networks:
      - uptimewatch_internal

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: uptimewatch-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
    ports:
      - "${NGINX_PORT}:80"
    networks:
      - uptimewatch_internal

volumes:
  postgres_data:
  redis_data:

networks:
  uptimewatch_internal:
    driver: bridge
